<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpolation Search Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        input[type="text"], input[type="number"] {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .array-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
            min-height: 100px;
        }

        .array-item {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ecf0f1;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid transparent;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Pointers states */
        .low {
            border-bottom: 4px solid #e74c3c; /* Red for low */
        }
        .high {
            border-top: 4px solid #3498db; /* Blue for high */
        }
        .pos {
            background-color: #2ecc71; /* Green for pos */
            color: white;
            transform: scale(1.1);
        }
        .found {
            background-color: #f1c40f; /* Gold for found */
            color: black;
            transform: scale(1.2);
        }

        .pointer-label {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef2f5;
            border-radius: 6px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Interpolation Search Visualizer</h1>
    
    <div class="controls">
        <input type="text" id="arrayInput" value="1, 2, 4, 6, 7, 8, 11, 24, 56, 58, 61, 63, 65, 67, 82" placeholder="Enter sorted array (comma separated)">
        <input type="number" id="keyInput" value="56" placeholder="Element to search in array">
        <button id="searchBtn" onclick="startSearch()">Search</button>
    </div>

    <div class="array-container" id="arrayDisplay"></div>

    <div class="status-box" id="statusText">Enter values and click Search to start.</div>
</div>

<script>
    // JavaScript translation of your Python code
    function interpolationSearch(arr, key) {
        let low = 0;
        let high = arr.length - 1;
        let steps = []; // To store states for visualization

        while (low <= high && key >= arr[low] && key <= arr[high]) {
            let currentStep = { low, high, pos: -1, found: false };

            if (low === high) {
                if (arr[low] === key) {
                    currentStep.pos = low;
                    currentStep.found = true;
                    steps.push(currentStep);
                    return { index: low, steps: steps };
                } else {
                    steps.push(currentStep);
                    return { index: -1, steps: steps };
                }
            }

            // Python: pos = low+((key - arr[low])* (high-low)// (arr[high]-arr[low]))
            // JS: Use Math.floor for integer division (//)
            let pos = low + Math.floor(((key - arr[low]) * (high - low)) / (arr[high] - arr[low]));
            currentStep.pos = pos;

            if (arr[pos] === key) {
                currentStep.found = true;
                steps.push(currentStep);
                return { index: pos, steps: steps };
            } else if (arr[pos] < key) {
                low = pos + 1;
            } else {
                high = pos - 1;
            }
            steps.push(currentStep);
        }
        return { index: -1, steps: steps };
    }

    function renderArray(arr, low = -1, high = -1, pos = -1, found = -1) {
        const container = document.getElementById('arrayDisplay');
        container.innerHTML = '';
        arr.forEach((val, i) => {
            const item = document.createElement('div');
            item.className = 'array-item';
            item.innerText = val;

            if (i === found) {
                item.classList.add('found');
            } else {
                if (i === pos) item.classList.add('pos');
                if (i === low) item.classList.add('low');
                if (i === high) item.classList.add('high');
            }
            container.appendChild(item);
        });
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startSearch() {
        const arrayInputVal = document.getElementById('arrayInput').value;
        const keyInputVal = parseInt(document.getElementById('keyInput').value);
        const statusText = document.getElementById('statusText');
        const searchBtn = document.getElementById('searchBtn');

        // Parse and sort array (Interpolation search requires a sorted array)
        let arr = arrayInputVal.split(',').map(item => parseInt(item.trim())).filter(item => !isNaN(item));
        arr.sort((a, b) => a - b);

        searchBtn.disabled = true;
        statusText.innerText = "Searching...";

        const { index, steps } = interpolationSearch(arr, keyInputVal);

        // Animate steps
        for (let i = 0; i < steps.length; i++) {
            const step = steps[i];
            renderArray(arr, step.low, step.high, step.pos, step.found ? step.pos : -1);
            
            if(step.found) {
                statusText.innerText = `Step ${i+1}: Element ${keyInputVal} found at index ${step.pos}!`;
            } else {
                statusText.innerText = `Step ${i+1}: Checking pos ${step.pos} (Low: ${step.low}, High: ${step.high})`;
            }
            
            await sleep(1200); // 1.2 seconds per step
        }

        // Final Result
        if (index !== -1) {
            statusText.innerText = `Result: Element ${keyInputVal} found in the array at index ${index}.`;
        } else {
            statusText.innerText = `Result: Element ${keyInputVal} not found in the array.`;
            renderArray(arr); // Reset colors
        }

        searchBtn.disabled = false;
    }

    // Initial render
    renderArray([1, 2, 4, 6, 7, 8, 11, 24, 56, 58, 61, 63, 65, 67, 82]);
</script>

</body>
</html>
